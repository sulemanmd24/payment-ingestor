server:
  port: 8080

spring:
  application:
    name: payment-ingestor
  management:
    endpoints:
      web:
        exposure:
          include: "*"   # expose all actuator endpoints
        base-path: /actuator

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:payment_ingestor
    username: sa
    password: sa

  jpa:
    hibernate:
      ddl-auto: update
    generate-ddl: false
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true

payment-ingrestor:
  kafka:
     producer:
      topics:
        payment-submitted: payments.submitted

logging:
  level:
    root: INFO
    org.springframework.kafka: DEBUG
    org.springframework.kafka.retrytopic: DEBUG
    org.springframework.kafka.listener: DEBUG
    org.apache.kafka.clients.consumer: INFO
    org.apache.kafka.clients.producer: INFO